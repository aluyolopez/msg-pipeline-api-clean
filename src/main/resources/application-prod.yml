# application-prod.yml — producción en AWS Lambda
app:
  aws:
    region: ${AWS_REGION_NAME:us-east-1}          # variable de entorno Lambda
    dynamodb-table: ${DYNAMODB_TABLE_NAME}    # variable de entorno Lambda
    sqs-queue-url: ${SQS_QUEUE_URL}           # variable de entorno Lambda
  log-level: INFO

logging:
  level:
    com.msgpipeline: INFO
